server {
    listen 80;
    server_name localhost;

    include /etc/nginx/conf.d/anthropic-key.conf;

    root /usr/share/nginx/html;
    index index.html;

    # Local login protection for Requirement 2 testing.
    auth_basic "DrivewayGuard Local Login";
    auth_basic_user_file /etc/nginx/.htpasswd-driveway-guard;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Local proxy to avoid browser CORS issues on direct Anthropic calls.
    location = /api/anthropic/messages {
        proxy_pass https://api.anthropic.com/v1/messages;
        proxy_ssl_server_name on;
        proxy_set_header Host api.anthropic.com;
        proxy_set_header Content-Type application/json;
        proxy_set_header anthropic-version "2023-06-01";
        proxy_set_header x-api-key $anthropic_api_key;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
